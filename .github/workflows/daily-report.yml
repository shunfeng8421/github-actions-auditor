name: "Daily Report"
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90f19
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests pyyaml
      - name: Generate daily report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          python auditor/scripts/daily_report.py \
            --events auditor/logs/events.jsonl \
            --findings auditor/findings/ \
            --tracking auditor/logs/pr_status.jsonl \
            --output "auditor/logs/daily_report_${DATE}.md"
      - name: Generate summary JSON
        run: |
          python auditor/scripts/summary_stats.py \
            --events auditor/logs/events.jsonl \
            --output auditor/logs/summary.json
      - name: Commit report
        run: |
          git config user.name "github-actions-auditor[bot]"
          git config user.email "github-actions-auditor[bot]@users.noreply.github.com"
          git add auditor/logs/
          git diff --staged --quiet || (git commit -m "[bot] daily-report" && git push)
      - name: Create daily issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          SUMMARY=$(python3 << 'PYEOF'
          import json
          try:
              d = json.load(open('auditor/logs/summary.json'))
              print(f"Repos: {d['total_repos_audited']} | Findings: {d['total_findings']} | PRs: {d['prs_merged']} merged / {d['prs_tracked']} tracked")
          except:
              print('Summary unavailable')
          PYEOF
          )
          gh issue create \
            --title "[Daily Report] ${DATE}" \
            --body "## Daily Audit Report - ${DATE}\n\n${SUMMARY}\n\nSee full report: auditor/logs/daily_report_${DATE}.md" \
            --label "daily-report"
