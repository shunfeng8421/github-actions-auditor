name: "Track PR Status"
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683       - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90f19         with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests pyyaml
      - name: Check PR statuses
        id: track
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python auditor/scripts/track_prs.py \
            --tracking auditor/logs/pr_tracking.jsonl \
            --output auditor/logs/pr_status.jsonl \
            --log auditor/logs/events.jsonl
      - name: Commit tracking update
        run: |
          git config user.name "github-actions-auditor[bot]"
          git config user.email "github-actions-auditor[bot]@users.noreply.github.com"
          git add -f auditor/logs/
          git diff --staged --quiet || (git commit -m "[bot] track: PR status update #${{ github.run_number }}" && git push)
      - name: Log merged PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python auditor/scripts/auto_label_merged.py \
            --tracking auditor/logs/pr_status.jsonl \
            --label "merged"
