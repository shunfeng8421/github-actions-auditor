name: "Discover Repos v2"
on: workflow_dispatch
permissions:
  contents: write
  issues: write
jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests pyyaml
      - name: Discover
        id: discover
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python auditor/scripts/discover.py \
            --min-stars 20 \
            --max-repos 10 \
            --verify \
            --output auditor/logs/discovered_repos.jsonl \
            --state auditor/logs/discover_state.json