name: "Discover Repos with Workflows"
on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      new_repos: ${{ steps.discover.outputs.new_repos }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests pyyaml
      - name: Discover repos
        id: discover
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python auditor/scripts/discover.py \
            --min-stars 20 \
            --max-repos 50 \
            --output auditor/logs/discovered_repos.jsonl \
            --state auditor/logs/discover_state.json
      - name: Commit results
        run: |
          git config user.name "github-actions-auditor[bot]"
          git config user.email "github-actions-auditor[bot]@users.noreply.github.com"
          git add -f auditor/logs/
          if ! git diff --staged --quiet; then
            git commit -m "[bot] discover: new workflow repos" && \
            git pull --rebase origin master && \
            git push origin master
          fi

      - name: Auto-trigger audits for new repos
        if: steps.discover.outputs.new_repos > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering audits for newly discovered repos..."
          while IFS= read -r line; do
            REPO_URL=$(echo "$line" | python3 -c "import sys,json; print(json.loads(sys.stdin.read()).get('url',''))")
            if [ -n "$REPO_URL" ]; then
              echo "  Triggering audit for: $REPO_URL"
              gh workflow run audit.yml -f repo_url="$REPO_URL" || true
              sleep 3
            fi
          done < <(tail -n ${{ steps.discover.outputs.new_repos }} auditor/logs/discovered_repos.jsonl)
      - name: Create discovery issue
        if: steps.discover.outputs.new_repos > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[Discover] ${{ steps.discover.outputs.new_repos }} new repos found" \
            --body "New repos discovered. Add audit-ready label to trigger audit." \
            --label "discover"
