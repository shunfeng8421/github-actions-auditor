name: "Fix Workflows & Create PR"
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Repo URL to fix"
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fix:
    if: github.event.label.name == 'fix-ready' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests pyyaml
      - name: Determine target repo
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REPO_URL="${{ github.event.inputs.repo_url }}"
          else
            ISSUE_BODY="${{ github.event.issue.body }}"
            REPO_URL=$(echo "$ISSUE_BODY" | grep -oP 'https://github\.com/[\w.-]+/[\w.-]+' | head -1)
          fi
          echo "url=${REPO_URL}" >> ${GITHUB_OUTPUT}
          REPO_NAME=$(echo "$REPO_URL" | grep -oP 'github\.com/\K[\w.-]+/[\w.-]+')
          echo "name=${REPO_NAME}" >> ${GITHUB_OUTPUT}
      - name: Clone target repo
        run: git clone --depth 1 ${{ steps.target.outputs.url }} /tmp/target_repo
      - name: Run audit
        run: |
          python auditor/scripts/audit.py \
            --target /tmp/target_repo \
            --rules auditor/rules/github-actions-security-rules.txt \
            --repo "${{ steps.target.outputs.name }}" \
            --output auditor/findings/ \
            --log auditor/logs/events.jsonl
      - name: Apply fixes and generate diff
        id: fix
        run: |
          REPO_SAFE=$(echo "${{ steps.target.outputs.name }}" | tr '/' '_')
          python auditor/scripts/fix.py \
            --target /tmp/target_repo \
            --findings "auditor/findings/${REPO_SAFE}/" \
            --repo "${{ steps.target.outputs.name }}"
          cd /tmp/target_repo
          git add .github/workflows/
          if git diff --staged --quiet; then
            echo "No changes needed"
            echo "has_changes=false" >> ${GITHUB_OUTPUT}
          else
            echo "has_changes=true" >> ${GITHUB_OUTPUT}
            git diff --staged > /tmp/fix.patch
          fi
      - name: Push to fork and create PR
        if: steps.fix.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd /tmp/target_repo
          REPO_NAME="${{ steps.target.outputs.name }}"
          BRANCH="gha-security-fixes-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git -c user.name="github-actions-auditor[bot]" -c user.email="github-actions-auditor[bot]@users.noreply.github.com" commit -m "[skip ci] security: harden GitHub Actions workflows"
          REPO_SHORT="${REPO_NAME##*/}"
          git remote add fork "https://x-access-token:${GH_TOKEN}@github.com/shunfeng8421/${REPO_SHORT}.git"
          git push fork "$BRANCH" --force
          gh pr create \
            --repo "$REPO_NAME" \
            --head "shunfeng8421:${BRANCH}" \
            --title "security: harden GitHub Actions workflows" \
            --body "Automated security fixes for GitHub Actions workflows by [github-actions-auditor](https://github.com/shunfeng8421/github-actions-auditor)"
          echo "PR created for $REPO_NAME"
      - name: Update issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Security fix PR submitted for ${{ steps.target.outputs.name }}"
          gh issue edit ${{ github.event.issue.number }} --remove-label "fix-ready" --add-label "pr-submitted"