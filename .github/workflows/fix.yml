name: "Fix Workflows & Create PR"
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Repo URL to fix"
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fix:
    if: github.event.label.name == 'fix-ready' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests pyyaml
      - name: Determine target repo
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REPO_URL="${{ github.event.inputs.repo_url }}"
          else
            ISSUE_BODY="${{ github.event.issue.body }}"
            REPO_URL=$(echo "$ISSUE_BODY" | grep -oP 'https://github\.com/[\w.-]+/[\w.-]+' | head -1)
          fi
          echo "url=${REPO_URL}" >> ${GITHUB_OUTPUT}
          REPO_NAME=$(echo "$REPO_URL" | grep -oP 'github\.com/\K[\w.-]+/[\w.-]+')
          echo "name=${REPO_NAME}" >> ${GITHUB_OUTPUT}
      - name: Clone target repo
        run: git clone --depth 1 ${{ steps.target.outputs.url }} /tmp/target_repo
      - name: Run audit
        run: |
          python auditor/scripts/audit.py \
            --target /tmp/target_repo \
            --rules auditor/rules/github-actions-security-rules.txt \
            --output auditor/findings/ \
            --log auditor/logs/events.jsonl
      - name: Apply fixes locally
        run: |
          python auditor/scripts/fix.py \
            --target /tmp/target_repo \
            --findings auditor/findings/ \
            --repo "${{ steps.target.outputs.name }}"
      - name: Commit, fork, push, and create PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd /tmp/target_repo
          BRANCH="gha-security-fixes-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add .github/workflows/
          if git diff --staged --quiet; then
            echo "No changes needed"
            echo "has_changes=false" >> ${GITHUB_OUTPUT}
            exit 0
          fi
          git -c user.name="github-actions-auditor[bot]" -c user.email="github-actions-auditor[bot]@users.noreply.github.com" commit -m "security: harden GitHub Actions workflows"
          echo "has_changes=true" >> ${GITHUB_OUTPUT}
          echo "branch=${BRANCH}" >> ${GITHUB_OUTPUT}
          
          REPO_NAME="${{ steps.target.outputs.name }}"
          REPO_SHORT="${REPO_NAME##*/}"
          
          # Fork and push
          gh repo fork "$REPO_NAME" --clone=false 2>&1 || echo "Fork may already exist"
          USERNAME=$(gh api user --jq '.login')
          git push "https://x-access-token:${GH_TOKEN}@github.com/${USERNAME}/${REPO_SHORT}.git" "$BRANCH" --force
          
          # Create PR
          gh pr create \
            --repo "$REPO_NAME" \
            --head "${USERNAME}:${BRANCH}" \
            --base "$(gh api "repos/${{ steps.target.outputs.name }}" --jq \".default_branch\")" \
            --title "security: harden GitHub Actions workflows" \
            --body "Automated security fixes by github-actions-auditor" 2>&1