name: "Fix Workflows & Create PR"
on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Repo URL to fix"
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests pyyaml
      - name: Clone target repo
        run: |
          REPO_URL="${{ github.event.inputs.repo_url }}"
          git clone --depth 1 "$REPO_URL" /tmp/target_repo
      - name: Run audit
        run: |
          python auditor/scripts/audit.py             --target /tmp/target_repo             --rules auditor/rules/github-actions-security-rules.txt             --output auditor/findings/             --log auditor/logs/events.jsonl
      - name: Apply fixes and create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_NAME=$(echo "${{ github.event.inputs.repo_url }}" | grep -oP 'github\.com/\K[\w.-]+/[\w.-]+')
          python auditor/scripts/fix.py             --target /tmp/target_repo             --findings auditor/findings/             --repo "$REPO_NAME"             --create-pr             --output auditor/logs/pr_tracking.jsonl
      - name: Commit tracking data
        run: |
          git config user.name "github-actions-auditor[bot]"
          git config user.email "github-actions-auditor[bot]@users.noreply.github.com"
          git add -f auditor/logs/
          git diff --staged --quiet || (git commit -m "[bot] fix: PR submitted" && git push)
