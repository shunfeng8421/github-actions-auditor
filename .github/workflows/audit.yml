name: "Audit GitHub Actions Workflows"
on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Repo URL to audit"
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests pyyaml
      - name: Clone target repo
        run: |
          git clone --depth 1 ${{ github.event.inputs.repo_url }} /tmp/target_repo
      - name: Run security audit
        run: |
          python auditor/scripts/audit.py             --target /tmp/target_repo             --rules auditor/rules/github-actions-security-rules.txt             --output auditor/findings/             --log auditor/logs/events.jsonl
      - name: Generate audit report
        run: |
          python auditor/scripts/report.py             --findings auditor/findings/             --output auditor/logs/audit_report.md
      - name: Commit audit findings
        run: |
          git config user.name "github-actions-auditor[bot]"
          git config user.email "github-actions-auditor[bot]@users.noreply.github.com"
          git add auditor/findings/ auditor/logs/
          git diff --staged --quiet || (git commit -m "[bot] audit: ${{ github.event.inputs.repo_url }}" && git push)
